<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Menu</title>
</head>
<body>
    <h1>Editar Plato</h1>
    <form action="{{ url_for('menu.editar_plato', plato_id=plato.id) }}" method="post" enctype="multipart/form-data">
        <p><input type="text" name="plato" placeholder="Nombre del plato" value="{{ plato.plato }}">
        <p><input type="number" name="precio" placeholder="Precio" min="0" step="0.01" value="{{ plato.precio }}">
        <p><input type="text" name="descripcion" placeholder="Descripción" value="{{ plato.descripcion }}">
        <p><input type="text" name="restricciones_alimenticias" placeholder="Restricciones alimenticias" value="{{ plato.restricciones_alimenticias }}">
        <p><button type="submit">Guardar Cambios</button>
    </form>
</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Menu</title>
</head>
<body>
    <h1>Admin Menu</h1>
    <form action="{{ url_for('menu.admin_menu') }}" method="post" enctype="multipart/form-data">
        <p><input type="text" name="plato" placeholder="Nombre del plato">
        <p><input type="number" name="precio" placeholder="Precio" min="0" step="0.01">
        <p><input type="text" name="descripcion" placeholder="Descripción">
        <p><input type="text" name="restricciones_alimenticias" placeholder="Restricciones alimenticias">
        <p><button type="submit">Agregar Plato</button>
    </form>
</body>
<table id="menu-table">
    <thead>
        <tr>
            <th>Nombre</th>
            <th>Precio</th>
            <th>Descripción</th>
            <th>Restricciones Alimenticias</th>
        </tr>
    <tbody  class="list">
    {% for plato in menu %}
        <tr>
            <td>{{ plato.plato }}</td>
            <td>${{ plato.precio }}</td>
            <td>{{ plato.descripcion }}</td>
            <td>{{ plato.restricciones_alimenticias }}</td>
            <td>
                <a href="{{ url_for('menu.delete_menu_item', plato_id=plato.id) }}" class="delete-button">Eliminar</a>
                <a href="{{ url_for('menu.editar_plato', plato_id=plato.id) }}" class="edit-button">Editar</a>
            </td>
        </tr>
    {% endfor %}
    </tbody>
</table>
</html>
